<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netlify Forms</title>
</head>
<body>
  <form name="wholesale-order" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="wholesale-order">
    <input name="subject">
    <input name="bot-field">
    <input name="business">
    <input name="name">
    <input name="email">
    <input name="phone">
    <input name="product1">
    <input name="qty1">
    <input name="prep1">
    <input name="product2">
    <input name="qty2">
    <input name="prep2">
    <input name="product3">
    <input name="qty3">
    <input name="prep3">
    <input name="method">
    <input name="date">
    <textarea name="notes"></textarea>
    <input name="cooking-service">
  </form>

  <form name="employment" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="employment">
    <input name="subject">
    <input name="bot-field">
    <input name="name">
    <input name="email">
    <input name="phone">
    <input name="position">
    <textarea name="experience"></textarea>
  </form>

  <form name="investors" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="investors">
    <input name="subject">
    <input name="bot-field">
    <input name="name">
    <input name="email">
    <input name="company">
    <input name="range">
  </form>

  <form name="donations" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="donations">
    <input name="subject">
    <input name="bot-field">
    <input name="name">
    <input name="email">
    <input name="type">
    <textarea name="message"></textarea>
  </form>
</body>
</html>
